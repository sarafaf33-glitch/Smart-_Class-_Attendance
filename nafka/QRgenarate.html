<script>
// 1. Search Subject - டைப் செய்யும்போது சப்ஜெக்ட்களை பில்டர் செய்யும் வசதி
document.getElementById("searchSubject").addEventListener("keyup", function() {
    let filter = this.value.toLowerCase();
    let select = document.getElementById("subjectSelect");
    let options = select.options;

    for (let i = 0; i < options.length; i++) {
        if (options[i].value === "") continue; // முதலாவது Default ஆப்ஷனை மறைக்காது

        let txt = options[i].text.toLowerCase();
        
        // பிரவுசர் குறைபாடுகள் இல்லாமல் இருக்க display, disabled, hidden மூன்றும் பயன்படுத்தப்பட்டுள்ளது
        if (txt.includes(filter)) {
            options[i].style.display = "";
            options[i].disabled = false;
            options[i].hidden = false;
        } else {
            options[i].style.display = "none";
            options[i].disabled = true;
            options[i].hidden = true;
        }
    }
});

// 2. Generate Specific QR - க்ளிக் செய்த சப்ஜெக்ட்டிற்கு QR Code உருவாக்கும் வசதி
function generateQR() {
    let subjectSelect = document.getElementById("subjectSelect");
    let subjectCode = subjectSelect.value;

    // சப்ஜெக்ட் எதையும் தேர்ந்தெடுக்கவில்லை என்றால் எச்சரிக்கும்
    if (subjectCode === "") {
        alert("Please select a subject (e.g., VAP) from the dropdown!");
        return;
    }

    let qrContainer = document.getElementById("qrcode");
    
    // தற்போதைய தேதி மற்றும் நேரத்தை எடுத்தல்
    let now = new Date();
    let date = now.toISOString().split('T')[0]; // Format: YYYY-MM-DD
    let time = now.toTimeString().split(' ')[0]; // Format: HH:MM:SS

    // நீங்கள் VAP-ஐ க்ளிக் செய்தால் QR Data: "VAP101|2026-06-15|16:03:02" என்று மாறும்
    let qrData = subjectCode + "|" + date + "|" + time;

    // பழைய QR கோட் ஏதும் இருந்தால் அதை முதலில் அழிக்கும்
    qrContainer.innerHTML = "";
    qrContainer.style.display = "flex";

    // புதிய பிரத்தியேக QR Code-ஐ உருவாக்குகிறது
    new QRCode(qrContainer, {
        text: qrData,
        width: 220,
        height: 220,
        colorDark: "#000000",
        colorLight: "#ffffff",
        correctLevel: QRCode.CorrectLevel.H
    });

    console.log("Generated Data for Scanning:", qrData);
}
</script>
