<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up Page</title>

    <style>

        /* RESET */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        /* BODY BACKGROUND */
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* 🌄 Background Image + Dark Overlay */
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url("https://images.unsplash.com/photo-1521737604893-d14cc237f11d");
            background-size: cover;
            background-position: center;
        }

        /* SIGNUP BOX (GLASS EFFECT) */
        .signup-container {
            width: 420px;
            padding: 40px;
            border-radius: 20px;
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            color: white;
        }

            /* TITLE */
            .signup-container h1 {
                text-align: center;
                margin-bottom: 10px;
                color: white;
            }

            /* SUB TEXT */
            .signup-container p {
                text-align: center;
                margin-bottom: 30px;
                color: #e0e0e0;
            }

        /* INPUT FIELDS */
        .input-group {
            margin-bottom: 20px;
        }

            .input-group label {
                display: block;
                margin-bottom: 8px;
                font-weight: bold;
                color: white;
            }

            .input-group input,
            .input-group select {
                width: 100%;
                padding: 12px;
                border-radius: 10px;
                border: 1px solid rgba(255,255,255,0.3);
                background: rgba(255,255,255,0.15);
                color: white;
                font-size: 16px;
                outline: none;
            }

                /* PLACEHOLDER COLOR */
                .input-group input::placeholder {
                    color: #ddd;
                }

        /* BUTTON */
        .signup-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(45deg,#6a11cb,#2575fc);
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
        }

            .signup-btn:hover {
                transform: scale(1.05);
            }

        /* LOGIN LINK */
        .extra {
            text-align: center;
            margin-top: 20px;
        }

            .extra a {
                text-decoration: none;
                color: #00d4ff;
                font-weight: bold;
            }
    </style>
</head>

<body>

    <div class="signup-container">

        <h1>Create Account</h1>
        <p>Register to Smart AMS</p>

        <!-- FULL NAME -->
        <div class="input-group">
            <label>Full Name</label>
            <input type="text" placeholder="Enter your full name">
        </div>

        <!-- REGISTER NUMBER -->
        <div class="input-group">
            <label>Register Number</label>
            <input type="text" placeholder="Enter register number">
        </div>

        <!-- EMAIL -->
        <div class="input-group">
            <label>Email</label>
            <input type="email" placeholder="Enter your email">
        </div>

        <!-- PASSWORD -->
        <div class="input-group">
            <label>Password</label>
            <input type="password" placeholder="Enter password">
        </div>

        <!-- ROLE -->
        <div class="input-group">
            <label>Select Role</label>
            <select>
                <option>Choose Role</option>
                <option>Student</option>
                <option>Lecturer</option>
                <option>Admin</option>
            </select>
        </div>

        <!-- BUTTON -->
        <button class="signup-btn" onclick="signup()">
            Sign Up
        </button>

        <!-- LOGIN LINK -->
        <div class="extra">
            <p>
                Already have an account?
                <a href="login.html">Login</a>
            </p>
        </div>

    </div>

    <script>
function signup(){
    alert("Account Created Successfully!");
    window.location.href = "home.html";
}
    </script>

</body>
</html>
