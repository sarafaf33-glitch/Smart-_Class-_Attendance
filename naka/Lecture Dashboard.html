<!DOCTYPE html>
<html lang="en">

<head>
    <title>Lecturer Dashboard</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }


        body {
            background:
                linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.75)),
                url("https://images.unsplash.com/photo-1521737604893-d14cc237f11d");

            background-size: cover;
            background-position: center;
            color: white;
        }

        .navbar {
            width: 100%;
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #00d4ff;
        }

        .logout-btn {
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            background: #115186;
            color: white;
            cursor: pointer;
        }

        .container {
            padding: 50px;
        }


        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .box {
            background: rgba(255, 255, 255, 0.08);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .box:hover {
            transform: translateY(-8px);
            background: rgba(255, 255, 255, 0.15);
        }

        .box h3 {
            color: #00d4ff;
        }


        .report {
            display: none;
            margin-top: 20px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
        }


        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th,
        td {
            padding: 15px;
            text-align: center;
        }

        th {
            background: rgba(0, 212, 255, 0.3);
        }

        tr:nth-child(even) {
            background: rgba(255, 255, 255, 0.05);
        }

        a {
            text-decoration: none;
        }

        .good {
            color: lightgreen;
            font-weight: bold;
        }

        .avg {
            color: orange;
            font-weight: bold;
        }

        .low {
            color: #ff4d4d;
            font-weight: bold;
        }


        .btn {
            margin-top: 10px;
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: linear-gradient(45deg, #00d4ff, #7b2ff7);
            color: white;
        }
    </style>

</head>

<body>


    <div class="navbar">

        <div class="logo">
            Lecturer Dashboard
        </div>

        <button class="logout-btn" onclick="logout()">
            Logout
        </button>

    </div>


    <div class="container">


        <div class="grid">

            <div class="box" onclick="alert('QR Generator')">
                <a href="QRgenarate.html">
                    <h3>📸QR Generate<h3>
                </a>
            </div>

            <div class="box" onclick="alert('Students List')">
                <a href="view student.html">
                    <h3>👨‍🎓 View Students</h3>
                </a>
            </div>

            <div class="box" onclick="toggleReport()">
                <a href="Attendance.html">
                    <h3>📊 Attendance Reports</h3>
                </a>
            </div>

            <div class="box" onclick="alert('Schedule Class')">
                <a href="schedule.html">
                <h3>📅 Schedule Class</h3>
                </a>
            </div>

        </div>

    </div>

    <script>


        function toggleReport() {

            let report = document.getElementById("reportSection");

            if (report.style.display === "block") {
                report.style.display = "none";
            } else {
                report.style.display = "block";
            }
        }


        function logout() {
            alert("Logged out!");
            window.location.href = "login.html";
        }

    </script>

</body>

</html>
