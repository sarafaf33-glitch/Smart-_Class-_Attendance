<!DOCTYPE html>
<html>
<head>
    <title>My Attendance</title>

    <style>

        /* RESET */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        /* BACKGROUND */
        body {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url("https://images.unsplash.com/photo-1521737604893-d14cc237f11d");
            background-size: cover;
            background-position: center;
            color: white;
        }

        /* CONTAINER */
        .container {
            padding: 50px;
        }

        /* HEADER CARD */
        .header {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 30px;
        }

            .header h1 {
                color: #00d4ff;
            }

        /* PERCENTAGE BOX */
        .percentage-box {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }

        .circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: conic-gradient(#00d4ff 0% 78%, rgba(255,255,255,0.2) 78%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            font-weight: bold;
        }

        /* TABLE */
        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            overflow: hidden;
        }

        th, td {
            padding: 15px;
            text-align: center;
        }

        th {
            background: rgba(0,212,255,0.3);
        }

        tr:nth-child(even) {
            background: rgba(255,255,255,0.05);
        }

        /* STATUS */
        .present {
            color: lightgreen;
            font-weight: bold;
        }

        .absent {
            color: #ff4d4d;
            font-weight: bold;
        }

        /* BUTTON */
        .btn {
            margin-top: 20px;
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: linear-gradient(45deg,#00d4ff,#7b2ff7);
            color: white;
        }
    </style>

</head>

<body>

    <div class="container">

        <!-- HEADER -->
        <div class="header">
            <h1>My Attendance Report 📊</h1>
            <p>Student attendance summary</p>
        </div>

        <!-- PERCENTAGE -->
        <div class="percentage-box">
            <div class="circle">
            </div>
        </div>

        <!-- TABLE -->
        <table>

            <tr>
                <th>Subject</th>
                <th>Total Classes</th>
                <th>Attended</th>
                <th>Status</th>
            </tr>

        </table>

        <!-- BACK BUTTON -->
        <div style="text-align:center;">
            <button class="btn" onclick="goBack()">
                Back to Dashboard
            </button>
        </div>

    </div>

    <script>

function goBack(){
    window.location.href = "studentdashboard.html";
}

    </script>

</body>
</html>
