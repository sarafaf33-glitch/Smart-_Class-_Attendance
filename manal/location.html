<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Live Location Tracking</title>

<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

/* BODY */
body{

    background:
    linear-gradient(rgba(0,0,0,0.7),
    rgba(0,0,0,0.7)),

    url("https://images.unsplash.com/photo-1521737604893-d14cc237f11d");

    background-size:cover;
    background-position:center;

    color:white;
}

/* NAVBAR */
.navbar{

    width:100%;
    padding:20px 50px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
}

.logo{

    font-size:25px;
    font-weight:bold;
    color:#00d4ff;
}

.back-btn{

    padding:10px 18px;

    border:none;
    border-radius:8px;

    background:#ff4d4d;
    color:white;

    cursor:pointer;
}

/* CONTAINER */
.container{
    padding:50px;
}

/* CARD */
.card{

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(10px);

    padding:25px;

    border-radius:15px;

    margin-bottom:30px;

    text-align:center;
}

.card h2{

    color:#00d4ff;

    margin-bottom:20px;
}

/* BUTTON */
.btn{

    padding:12px 20px;

    border:none;
    border-radius:8px;

    cursor:pointer;

    background:
    linear-gradient(45deg,#00d4ff,#7b2ff7);

    color:white;

    font-size:16px;
}

/* RESULT */
#result{

    margin-top:25px;

    font-size:20px;

    line-height:1.8;
}

/* STATUS */
.inside{
    color:lightgreen;
    font-weight:bold;
}

.outside{
    color:#ff4d4d;
    font-weight:bold;
}

/* MAP */
.map-link{

    display:inline-block;

    margin-top:20px;

    color:#00d4ff;

    text-decoration:none;

    font-weight:bold;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">

    <div class="logo">
        Live Location
    </div>

    <button class="back-btn"
    onclick="goBack()">
        Back
    </button>

</div>

<!-- CONTENT -->
<div class="container">

    <div class="card">

        <h2>📍 Campus Live Location Tracking</h2>

        <p>
            Check whether the user is
            inside or outside the campus
        </p>

        <br>

        <button class="btn"
        onclick="getLocation()">

            Check Location

        </button>

        <!-- RESULT -->
        <div id="result"></div>

    </div>

</div>

<script>

/* CAMPUS LOCATION */
const campusLat = 6.927079;
const campusLon = 79.861244;

/* GET LOCATION */
function getLocation(){

    if(navigator.geolocation){

        navigator.geolocation
        .getCurrentPosition(showPosition,
        showError);

    } else {

        alert("Geolocation not supported");
    }
}

/* SHOW POSITION */
function showPosition(position){

    let lat =
    position.coords.latitude;

    let lon =
    position.coords.longitude;

    let distance =
    calculateDistance(
    lat, lon,
    campusLat, campusLon);

    let result =
    document.getElementById("result");

    result.innerHTML =

    "📍 Latitude : " +
    lat.toFixed(5) +

    "<br>📍 Longitude : " +
    lon.toFixed(5) +

    "<br>📏 Distance : " +
    distance.toFixed(2) +
    " km <br><br>";

    /* CHECK CAMPUS */
    if(distance <= 0.5){

        result.innerHTML +=
        "<span class='inside'>✅ Inside Campus</span>";

    } else {

        result.innerHTML +=
        "<span class='outside'>❌ Outside Campus</span>";
    }

    /* GOOGLE MAP */
    result.innerHTML +=

    "<br><br>" +

    "<a class='map-link' target='_blank' href='https://www.google.com/maps?q="
    + lat + "," + lon + "'>" +

    "🗺️ Open in Google Maps</a>";
}

/* ERROR */
function showError(){

    alert("Location permission denied");
}

/* DISTANCE */
function calculateDistance(
lat1, lon1, lat2, lon2){

    let R = 6371;

    let dLat =
    (lat2-lat1) * Math.PI/180;

    let dLon =
    (lon2-lon1) * Math.PI/180;

    let a =

    Math.sin(dLat/2) *
    Math.sin(dLat/2) +

    Math.cos(lat1*Math.PI/180) *

    Math.cos(lat2*Math.PI/180) *

    Math.sin(dLon/2) *
    Math.sin(dLon/2);

    let c =

    2 * Math.atan2(
    Math.sqrt(a),
    Math.sqrt(1-a));

    return R * c;
}

/* BACK */
function goBack(){

    window.location.href =
    "admin-dashboard.html";
}

</script>

</body>
</html>
