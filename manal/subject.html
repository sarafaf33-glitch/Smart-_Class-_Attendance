<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Manage Subjects</title>

<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

/* BODY */
body{

    background:
    linear-gradient(rgba(0,0,0,0.7),
    rgba(0,0,0,0.7)),

    url("https://images.unsplash.com/photo-1521737604893-d14cc237f11d");

    background-size:cover;
    background-position:center;

    color:white;
}

/* NAVBAR */
.navbar{

    width:100%;
    padding:20px 50px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
}

.logo{
    font-size:25px;
    font-weight:bold;
    color:#00d4ff;
}

.back-btn{

    padding:10px 18px;
    border:none;
    border-radius:8px;

    background:#ff4d4d;
    color:white;
    cursor:pointer;
}

/* CONTAINER */
.container{
    padding:50px;
}

/* CARD */
.card{

    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);

    padding:25px;
    border-radius:15px;

    margin-bottom:30px;
}

.card h2{
    color:#00d4ff;
    margin-bottom:20px;
}

/* INPUT */
input{

    width:100%;
    padding:12px;

    margin-bottom:15px;

    border:none;
    border-radius:10px;
    outline:none;
}

/* BUTTON */
.btn{

    padding:10px 18px;

    border:none;
    border-radius:8px;

    cursor:pointer;

    background:
    linear-gradient(45deg,#00d4ff,#7b2ff7);

    color:white;
}

/* TABLE */
table{

    width:100%;
    border-collapse:collapse;

    margin-top:20px;
}

th,td{

    padding:15px;
    text-align:center;
}

th{
    background:rgba(0,212,255,0.3);
}

tr:nth-child(even){
    background:rgba(255,255,255,0.05);
}

/* ACTION */
.edit{
    background:orange;
}

.delete{
    background:#ff4d4d;
}

/* TOTAL */
.total-box{

    margin-top:20px;

    background:rgba(0,212,255,0.2);

    padding:15px;
    border-radius:10px;

    text-align:center;

    font-size:20px;
    font-weight:bold;

    color:#00d4ff;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">

    <div class="logo">
        Manage Subjects
    </div>

    <a href="admin.html.html">
    <button class="back-btn"
    onclick="goBack()">
        Back
    </button>
    </a>

</div>

<!-- CONTENT -->
<div class="container">

    <!-- ADD SUBJECT -->
    <div class="card">

        <h2>➕ Add Subject</h2>

        <input type="text"
        id="subjectName"
        placeholder="Enter Subject Name">

        <input type="text"
        id="subjectCode"
        placeholder="Enter Subject Code">

        <input type="text"
        id="lecturer"
        placeholder="Enter Lecturer Name">

        <button class="btn"
        onclick="addSubject()">

            Add Subject

        </button>

    </div>

    <!-- SUBJECT TABLE -->
    <div class="card">

        <h2>📚 Subject List</h2>

        <table id="subjectTable">

            <tr>

                <th>Subject</th>
                <th>Code</th>
                <th>Lecturer</th>
                <th>Actions</th>

            </tr>

            <tr>

                <td>Web Development</td>
                <td>WEB101</td>
                <td>Mr Ahamed</td>

                <td>

                    <button class="btn edit">
                        Edit
                    </button>

                    <button class="btn delete"
                    onclick="deleteRow(this)">
                        Delete
                    </button>

                </td>

            </tr>

        </table>

        <!-- TOTAL -->
        <div class="total-box">

            Total Subjects :
            <span id="totalSubjects">1</span>

        </div>

    </div>

</div>

<script>

/* TOTAL */
let total = 1;

/* ADD SUBJECT */
function addSubject(){

    let name =
    document.getElementById("subjectName").value;

    let code =
    document.getElementById("subjectCode").value;

    let lecturer =
    document.getElementById("lecturer").value;

    if(name==="" ||
       code==="" ||
       lecturer===""){

        alert("Please fill all fields");

        return;
    }

    let table =
    document.getElementById("subjectTable");

    let row =
    table.insertRow();

    row.innerHTML =

    "<td>"+name+"</td>" +

    "<td>"+code+"</td>" +

    "<td>"+lecturer+"</td>" +

    "<td>" +

    "<button class='btn edit'>Edit</button> " +

    "<button class='btn delete' onclick='deleteRow(this)'>Delete</button>" +

    "</td>";

    /* TOTAL UPDATE */
    total++;

    document.getElementById("totalSubjects")
    .innerHTML = total;

    /* CLEAR INPUT */
    document.getElementById("subjectName").value="";
    document.getElementById("subjectCode").value="";
    document.getElementById("lecturer").value="";

}

/* DELETE */
function deleteRow(btn){

    let row =
    btn.parentNode.parentNode;

    row.parentNode.removeChild(row);

    total--;

    document.getElementById("totalSubjects")
    .innerHTML = total;
}

/* BACK */
function goBack(){

    window.location.href =
    "admin.html";
}

</script>

</body>
</html>
