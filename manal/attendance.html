<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Attendance Reports</title>

<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

/* BODY */
body{

    background:
    linear-gradient(rgba(0,0,0,0.7),
    rgba(0,0,0,0.7)),

    url("https://images.unsplash.com/photo-1521737604893-d14cc237f11d");

    background-size:cover;
    background-position:center;

    color:white;
}

/* NAVBAR */
.navbar{

    width:100%;
    padding:20px 50px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
}

.logo{

    font-size:25px;
    font-weight:bold;
    color:#00d4ff;
}

.back-btn{

    padding:10px 18px;
    border:none;
    border-radius:8px;

    background:#ff4d4d;
    color:white;

    cursor:pointer;
}

/* CONTAINER */
.container{
    padding:50px;
}

/* CARD */
.card{

    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);

    padding:25px;
    border-radius:15px;

    margin-bottom:30px;
}

.card h2{

    color:#00d4ff;
    margin-bottom:20px;
}

/* TABLE */
table{

    width:100%;
    border-collapse:collapse;

    margin-top:20px;
}

th,td{

    padding:15px;
    text-align:center;
}

th{
    background:rgba(0,212,255,0.3);
}

tr:nth-child(even){
    background:rgba(255,255,255,0.05);
}

/* STATUS */
.good{
    color:lightgreen;
    font-weight:bold;
}

.avg{
    color:orange;
    font-weight:bold;
}

.low{
    color:#ff4d4d;
    font-weight:bold;
}

/* SUMMARY */
.summary{

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(220px,1fr));

    gap:20px;

    margin-bottom:30px;
}

/* BOX */
.box{

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(10px);

    padding:25px;

    border-radius:15px;

    text-align:center;
}

.box h3{

    color:#00d4ff;

    margin-bottom:10px;
}

.box p{

    font-size:28px;
    font-weight:bold;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">

    <div class="logo">
        Attendance Reports
    </div>

    <button class="back-btn"
    onclick="goBack()">
        Back
    </button>

</div>

<!-- CONTENT -->
<div class="container">

    <!-- SUMMARY -->
    <div class="summary">

        <div class="box">

            <h3>Total Students</h3>

            <p>120</p>

        </div>

        <div class="box">

            <h3>Present Today</h3>

            <p>102</p>

        </div>

        <div class="box">

            <h3>Absent Today</h3>

            <p>18</p>

        </div>

        <div class="box">

            <h3>Attendance Rate</h3>

            <p>85%</p>

        </div>

    </div>

    <!-- REPORT TABLE -->
    <div class="card">

        <h2>📊 Student Attendance Report</h2>

        <table>

            <tr>

                <th>Student</th>
                <th>Reg No</th>
                <th>Java</th>
                <th>Web</th>
                <th>DBMS</th>
                <th>Total</th>
                <th>Status</th>

            </tr>

            <tr>

                <td>Ahamed</td>
                <td>2025001</td>
                <td>90%</td>
                <td>85%</td>
                <td>80%</td>
                <td>85%</td>

                <td class="good">
                    Good
                </td>

            </tr>

            <tr>

                <td>Maryam</td>
                <td>2025002</td>
                <td>65%</td>
                <td>60%</td>
                <td>55%</td>
                <td>60%</td>

                <td class="avg">
                    Average
                </td>

            </tr>

            <tr>

                <td>Fathima</td>
                <td>2025003</td>
                <td>45%</td>
                <td>40%</td>
                <td>35%</td>
                <td>40%</td>

                <td class="low">
                    Low
                </td>

            </tr>

        </table>

    </div>

</div>

<script>

/* BACK */
function goBack(){

    window.location.href =
    "admin-dashboard.html";
}

</script>

</body>
</html>
