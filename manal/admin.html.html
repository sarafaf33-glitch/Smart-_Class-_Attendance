

        
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Admin Dashboard</title>

    <style>

        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial,sans-serif;
        }

        
        body {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url("https://images.unsplash.com/photo-1521737604893-d14cc237f11d");
            background-size: cover;
            background-position: center;
            color: white;
        }
            width: 100%;
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
        }

        .logo {
            font-size: 26px;
            font-weight: bold;
            color: #00d4ff;
        }

        .logout-btn {
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            background: #ff4d4d;
            color: white;
            cursor: pointer;
        }

      
        .container {
            padding: 50px;
        }

        
        .card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
        }

            .card h2 {
                color: #00d4ff;
                margin-bottom: 10px;
            }

      
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit,minmax(220px,1fr));
            gap: 20px;
        }

        
        .box {
            background: rgba(255,255,255,0.08);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            transition: 0.3s;
        }

            .box:hover {
                transform: translateY(-8px);
                background: rgba(255,255,255,0.15);
            }

            .box h3 {
                color: #00d4ff;
                margin-bottom: 10px;
            }

      
        .btn {
            margin-top: 15px;
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: linear-gradient(45deg,#00d4ff,#7b2ff7);
            color: white;
        }

       
        #locResult {
            margin-top: 15px;
            font-size: 15px;
            line-height: 1.8;
        }
    </style>
</head>

<body>

   
    <div class="navbar">

        <div class="logo">
            Admin Dashboard
        </div>

        <button class="logout-btn"
                onclick="logout()">

            Logout

        </button>

    </div>

   
    <div class="container">

        
        <div class="card">

            <h2>
                Welcome Admin 👋
            </h2>

            <p>
                Manage Smart Attendance System
            </p>

        </div>

        
        <div class="grid">

            
            <div class="box">

                <h3>
                    👨‍🎓 Manage Students
                </h3>

                <p>
                    Add, Edit and Delete Students
                </p>

                <button class="btn"
                        onclick="openStudentsPage()">

                    Open

                </button>

            </div>

            
            <div class="box">

                <h3>
                    👨‍🏫 Manage Lecturers
                </h3>

                <p>
                    Add and Manage Lecturers
                </p>

                <button class="btn"
                        onclick="openLecturersPage()">

                    Open

                </button>

            </div>

            
            <div class="box">

                <h3>
                    📚 Manage Subjects
                </h3>

                <p>
                    Add and Manage Subjects
                </p>

                <button class="btn"
                        onclick="openSubjectsPage()">

                    Open

                </button>

            </div>

           
            <div class="box">

                <h3>
                    📊 Attendance Reports
                </h3>

                <p>
                    View Attendance Reports
                </p>

                <button class="btn"
                        onclick="openReportsPage()">

                    open
                </button>    
        </div>

    </div>

    <script>

        
        function logout() {

            alert("Logged out successfully!");

            window.location.href =
                "../rifa/login.php";
        }

        

        function openStudentsPage() {

            window.location.href =
                "students.html";
        }

        function openLecturersPage() {

            window.location.href =
                "lectures.html";
        }

        function openSubjectsPage() {

            window.location.href =
                "subject.html";
        }

    </script>

</body>
</html>
